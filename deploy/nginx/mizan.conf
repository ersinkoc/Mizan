# TLS-terminating reverse proxy for a private Mizan listener.
#
# Replace mizan.example.com and certificate paths before use.
# Keep the upstream bound to localhost unless you have a private network boundary.

upstream mizan_backend {
    server 127.0.0.1:7890;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name mizan.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mizan.example.com;

    ssl_certificate /etc/letsencrypt/live/mizan.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mizan.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_pass http://mizan_backend;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
